<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İleri Javascript Çalışmalarım</title>
    <link rel="stylesheet" href="../cssPages/style.css">
</head>
<body>
    
    <center>

        <!-- getElementById Uygulaması -->
        <h1 id="baslik">Beni Değiştir</h1>
        <button id="degisim">Değiştir</button>

        <hr>

        <!-- getElementbyClassName -->
        <p class="metin">Yazıyı Değiştir</p>
        <p class="metin">Yazıyı Değiştir</p>
        <button id="degistir">Yazıları Değiştir</button>

        <hr>

        <!-- getElementByTagName -->
        <ul>
           <li>Listeyi Değiş</li>
           <li>Listeyi Değiş</li>
        </ul>
        <button id="degis">Listeleri Değiş</button>
         
        <hr>

        <!-- QuerySelector -->
         <ul>
            <li class="yeni">Beni Yenile</li>
            <li class="yeni">Beni Yenile</li>
         </ul>
         <button id="yenile">Yenile</button>

    </center>

    <script src="../jsPages/script.js"></script>

</body>
</html>
